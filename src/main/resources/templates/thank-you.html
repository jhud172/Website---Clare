<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: page(${pageTitle}, ${pageDescription}, '', ~{::main})}">
<main>
    <section class="page-hero">
        <div class="shell page-hero-grid">
            <div>
                <p class="eyebrow">Thank you</p>
                <h1>Your enquiry has been safely received.</h1>
            </div>
            <p class="lead">Clare will read through your details and come back to you personally as soon as she can.</p>
        </div>
    </section>

    <section class="section">
        <div class="shell narrow-copy">
            <p>If your enquiry is time-sensitive, you are also welcome to follow up by email or phone using the contact details shown on the site.</p>
            <a class="button" th:href="@{/}">Return home</a>
        </div>
    </section>
</main>
</html>

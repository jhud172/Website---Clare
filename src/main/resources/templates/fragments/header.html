<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="site-header" data-site-header th:fragment="site-header(activePage)">
    <div class="shell header-inner">
        <a class="brand" th:href="@{/}" aria-label="Go to the home page">
            <span class="brand-mark brand-mark-image">
                <img class="brand-logo"
                     th:src="@{/images/brand/logo-primary.jpg}"
                     alt="Clare Life Ceremonies by Design logo.">
            </span>
            <span class="brand-wording">
                <span class="brand-name" th:text="${site.name}">Clare Brunton Life Ceremonies</span>
                <span class="brand-tagline">Personal ceremonies, thoughtfully written and gently delivered.</span>
            </span>
        </a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-navigation" data-nav-toggle>
            <span class="sr-only">Open menu</span>
            <span>Menu</span>
        </button>

        <nav class="site-nav" id="site-navigation" data-site-nav>
            <a th:href="@{/}" th:classappend="${activePage == 'home'} ? ' is-active'">Home</a>
            <a th:href="@{/about}" th:classappend="${activePage == 'about'} ? ' is-active'">About</a>
            <a th:href="@{/ceremonies}" th:classappend="${activePage == 'ceremonies'} ? ' is-active'">Ceremonies</a>
            <a th:href="@{/weddings}" th:classappend="${activePage == 'weddings'} ? ' is-active'">Weddings</a>
            <a th:href="@{/funerals}" th:classappend="${activePage == 'funerals'} ? ' is-active'">Funerals</a>
            <a th:href="@{/contact}" th:classappend="${activePage == 'contact'} ? ' is-active'">Contact</a>
        </nav>

        <a class="button header-cta" th:href="@{/contact}">Make an enquiry</a>
    </div>
</header>
</body>
</html>

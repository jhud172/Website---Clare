server:
  port: ${PORT:8080}

spring:
  application:
    name: clare-ceremonies-site
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 15MB
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

site:
  name: ${SITE_NAME:Clare Brunton Life Ceremonies}
  tagline: ${SITE_TAGLINE:Weddings, funerals and heartfelt ceremonies in between.}
  contact-email: ${SITE_CONTACT_EMAIL:clarebruntoncelebrant@gmail.com}
  phone-number: ${SITE_PHONE_NUMBER:07885 428304}
  instagram-url: ${SITE_INSTAGRAM_URL:}
  base-url: ${SITE_BASE_URL:http://localhost:8080}
  from-email: ${SITE_FROM_EMAIL:}

inquiry:
  notification-email: ${INQUIRY_NOTIFICATION_EMAIL:${SITE_CONTACT_EMAIL:hello@clarebrunton.co.uk}}
